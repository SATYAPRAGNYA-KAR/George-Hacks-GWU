services:
  - type: web
    name: food-insecurity-api
    runtime: python
    plan: free
    region: ohio
    branch: main
    buildCommand: pip install -r requirements.txt && npm install --prefix rootbridge-project && npm run build --prefix rootbridge-project
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: EARTHDATA_TOKEN
        sync: false
      - key: BUILDER1_API
        value: https://food-insecurity-api.onrender.com
      - key: BUILDER2_API
        value: https://food-insecurity-api.onrender.com
